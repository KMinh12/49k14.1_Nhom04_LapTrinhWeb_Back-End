{% load static %}


<!DOCTYPE html>
<html lang="vi">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Đăng Nhập - 2000 Nails & Eyelash</title>


   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">


   <style>
       * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arimo', sans-serif; }


       body.login-page {
           background: #F5F0ED;
           height: 100vh;
           display: flex;
           align-items: center;
           justify-content: center;
       }


       .login-card {
           background: white;
           padding: 40px 50px;
           border-radius: 20px;
           width: 100%;
           max-width: 420px;
           box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
           text-align: center;
       }


       .login-title {
           color: #8B7167;
           font-size: 28px;
           font-weight: 700;
           margin-bottom: 30px;
       }


       .form-group {
           margin-bottom: 20px;
           text-align: left;
       }


       .form-group label {
           display: block;
           margin-bottom: 8px;
           font-weight: 500;
           color: #555;
       }


       .form-group input {
           width: 100%;
           padding: 14px 16px;
           border: 1px solid #ddd;
           border-radius: 8px;
           font-size: 16px;
           outline: none;
           transition: border 0.3s;
       }


       .form-group input:focus {
           border-color: #8B7167;
       }


       /* Tùy chỉnh Radio Button */
       .radio-group {
           display: flex;
           gap: 30px;
           justify-content: center;
           margin: 25px 0;
       }


       .radio-container {
           display: flex;
           align-items: center;
           gap: 8px;
           cursor: pointer;
           font-weight: 500;
           position: relative;
       }


       /* Ẩn input gốc */
       .radio-container input {
           display: none;
       }


       .checkmark {
           width: 20px;
           height: 20px;
           border: 2px solid #8B7167;
           border-radius: 50%;
           position: relative;
           display: inline-block;
       }


       .radio-container input:checked + .checkmark::after {
           content: '';
           position: absolute;
           top: 50%; left: 50%;
           transform: translate(-50%, -50%);
           width: 10px; height: 10px;
           background: #8B7167;
           border-radius: 50%;
       }


       .btn-login {
           width: 100%;
           padding: 15px;
           background: #8B7167;
           color: white;
           border: none;
           border-radius: 8px;
           font-size: 17px;
           font-weight: 600;
           cursor: pointer;
           margin-top: 10px;
           transition: background 0.3s;
       }


       .btn-login:hover { background: #7A5F52; }
       .btn-login:disabled { background: #ccc; cursor: not-allowed; }


       /* Modal Thành công */
       .modal-overlay {
           position: fixed;
           top: 0; left: 0; right: 0; bottom: 0;
           background-color: rgba(245, 240, 237, 0.9);
           display: none;
           align-items: center;
           justify-content: center;
           z-index: 9999;
       }


       .success-modal {
           background: white;
           padding: 40px 50px;
           border-radius: 20px;
           text-align: center;
           box-shadow: 0 10px 30px rgba(0,0,0,0.1);
           max-width: 380px;
       }


       .success-icon img {
           width: 70px;
           height: auto;
           margin-bottom: 10px;
       }


       .success-title {
           color: #8B7167;
           font-size: 24px;
           margin: 10px 0;
       }


       .success-message {
           color: #666;
           font-size: 16px;
       }
   </style>
</head>
<body class="login-page">


   <div class="login-card">
       <h1 class="login-title">ĐĂNG NHẬP</h1>


       <form id="loginForm">
           {% csrf_token %}
           <div class="form-group">
               <label for="username">Tên đăng nhập</label>
               <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
           </div>


           <div class="form-group">
               <label for="password">Mật khẩu</label>
               <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
           </div>


           <div class="radio-group">
               <label class="radio-container">
                   <input type="radio" name="role" value="quanly">
                   <span class="checkmark"></span>
                   Quản lý
               </label>
               <label class="radio-container">
                   <input type="radio" name="role" value="nhanvien" checked>
                   <span class="checkmark"></span>
                   Nhân viên
               </label>
           </div>


           <button type="submit" class="btn-login" id="submitBtn">ĐĂNG NHẬP</button>
       </form>
   </div>


   <div class="modal-overlay" id="successModal">
       <div class="success-modal">
           <div class="success-icon">
               <img src="{% static 'icon/19_Check.png' %}" alt="Success Icon">
           </div>
           <h2 class="success-title">Đăng nhập thành công!</h2>
           <p class="success-message" id="successMessageText">Đang chuyển hướng...</p>
       </div>
   </div>


   <script>
       const loginForm = document.getElementById('loginForm');
       const submitBtn = document.getElementById('submitBtn');
       const successModal = document.getElementById('successModal');
       const successMessageText = document.getElementById('successMessageText');


       loginForm.addEventListener('submit', async function(e) {
           e.preventDefault();


           // Vô hiệu hóa nút để tránh double-click
           submitBtn.disabled = true;
           submitBtn.textContent = 'ĐANG XỬ LÝ...';


           const formData = new FormData(loginForm);


           try {
               const response = await fetch("{% url 'nails_backend:DangNhap_QLNV' %}", {
                   method: "POST",
                   body: formData,
                   headers: {
                       "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value
                   }
               });


               // THÊM ĐOẠN KIỂM TRA NÀY:
               if (!response.ok) {
                   // Nếu server lỗi (500, 404...), ném lỗi để nhảy vào khối catch
                   const errorData = await response.text();
                   console.error("Server Error Detail:", errorData); // Xem lỗi chi tiết trong F12 Console
                   throw new Error(`Server phản hồi lỗi: ${response.status}`);
               }


               const result = await response.json();


               if (result.success) {
                   successModal.style.display = 'flex';
                   successMessageText.textContent = result.message || 'Đang chuyển hướng...';


                   setTimeout(() => {
                       window.location.href = result.redirect_url;
                   }, 1500);
               } else {
                   alert(result.message || "Đăng nhập thất bại!");
                   submitBtn.disabled = false;
                   submitBtn.textContent = 'ĐĂNG NHẬP';
               }
               } catch (error) {
                   console.error("Lỗi kết nối hoặc xử lý:", error); // Dòng này cực kỳ quan trọng để debug
                   alert("Có lỗi xảy ra: " + error.message);
                   submitBtn.disabled = false;
                   submitBtn.textContent = 'ĐĂNG NHẬP';
               }
       });
   </script>
</body>
</html>
