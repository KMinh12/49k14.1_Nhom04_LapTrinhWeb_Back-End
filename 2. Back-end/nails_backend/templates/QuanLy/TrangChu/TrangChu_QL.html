{% extends 'base_QL.html' %}


{% block title %}Trang chủ{% endblock %}
{% block page_title %}Trang chủ{% endblock %}


{% block content %}
<style>
   .trangchu-wrapper {
       width: 100%;
   }


   .welcome-box {
       width: 100%;
       background: #FFFFFF;
       border-radius: 22px;
       padding: 36px 42px;
       box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
   }


   .welcome-small {
       color: #C2A59C;
       font-size: 16px;
       margin-bottom: 18px;
   }


   .welcome-title {
       color: #8B7167;
       font-size: 28px;
       font-weight: 700;
       margin-bottom: 28px;
   }


   .welcome-desc {
       color: #C2A59C;
       font-size: 16px;
       margin-bottom: 28px;
   }


   .welcome-line {
       border: none;
       height: 1px;
       background-color: #D9D9D9;
       width: 100%;
   }
</style>


<div class="trangchu-wrapper">
   <div class="welcome-box">
       <p class="welcome-small">Chào mừng trở lại</p>
       <h1 class="welcome-title">Xin chào, {{ ten_quan_ly|default:"Quản lý" }} </h1>
       <p class="welcome-desc" id="today-text"></p>
       <hr class="welcome-line">
   </div>
</div>


<script>
   const today = new Date();


   const days = [
       "Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư",
       "Thứ Năm", "Thứ Sáu", "Thứ Bảy"
   ];


   const dayName = days[today.getDay()];
   const day = String(today.getDate()).padStart(2, '0');
   const month = String(today.getMonth() + 1).padStart(2, '0');
   const year = today.getFullYear();


   document.getElementById("today-text").innerText =
       `Hôm nay là ${dayName}, ${day}/${month}/${year}. Chúc bạn một ngày làm việc vui vẻ!`;
</script>
{% endblock %}
