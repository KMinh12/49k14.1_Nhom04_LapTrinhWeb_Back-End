{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trang chủ - NV | 2000 Nails & Eyelash{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arimo', sans-serif; }
        body { background-color: #F5F0ED; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background-color: #8B7167; color: #FFFFFF; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
        .logo-section { display: flex; align-items: center; padding: 25px 20px; background-color: rgba(0,0,0,0.05); }
        .logo-circle { width: 40px; height: 40px; border-radius: 50%; margin-right: 10px; object-fit: cover; }
        .logo-text { font-size: 18px; font-weight: 700; line-height: 1.1; }
        .menu { flex: 1; padding: 10px 0; }
        .menu-item { display: flex; align-items: center; color: #FFFFFF; text-decoration: none; font-size: 15px; font-weight: 600; padding: 15px 20px; transition: background-color 0.2s; }
        .menu-item:hover, .menu-item.active { background-color: rgba(255,255,255,0.15); }
        .menu-icon { width: 30px; height: 30px; margin-right: 12px; display: flex; justify-content: center; align-items: center; }
        .menu-icon img { width: 100%; height: 100%; object-fit: contain; }

        /* MAIN */
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: white; border-bottom: 1px solid #eee; }
        .page-title { font-size: 28px; color: #8B7167; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .user-role { font-size: 14px; color: #666; }
        .user-name { font-weight: bold; color: #333; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .btn-logout { background-color: #C5A99E; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        .content-container { padding: 40px; flex: 1; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="{% url 'nails_backend:TrangChu_NV' %}" style="text-decoration: none; color: inherit;">
            <div class="logo-section">
                <img class="logo-circle" src="{% static 'logo/logo.jpg' %}" alt="Logo">
                <div class="logo-text">2000<br>Nails Eyelash</div>
            </div>
        </a>

        <nav class="menu">
            <a href="{% url 'nails_backend:QuanLyCaLam_NV' %}" class="menu-item {% if request.path == '/QuanLyCaLam_NV/' %}active{% endif %}">
                <div class="menu-icon"><img src="{% static 'icon/7_Quanlycalam.png' %}" alt=""></div>
                Quản lý ca làm cá nhân
            </a>
            <a href="{% url 'nails_backend:QuanLyTaiKhoan_NV' %}" class="menu-item {% if request.path == '/QuanLyTaiKhoan_NV/' %}active{% endif %}">
                <div class="menu-icon"><img src="{% static 'icon/8_Quanlytaikhoancanhan.png' %}" alt=""></div>
                Quản lý tài khoản cá nhân
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title">{% block page_title %}Trang chủ{% endblock %}</h1>

            <div class="header-right">
                <div class="user-info">
                    <div style="text-align: right;">
                        <span class="user-role">Nhân viên</span>
                        <span class="user-name">{{ user.full_name|default:"Nhân viên" }}</span>
                    </div>
                    <img src="https://i.pravatar.cc/150?img=32" alt="Avatar" class="avatar">
                </div>
                <button class="btn-logout" onclick="window.location.href='{% url 'nails_backend:DangNhap_QLNV' %}'">Đăng xuất</button>
            </div>
        </header>

        <div class="content-container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
